# ====================================================================
# Docker Compose — Tienda Abuela Serafina
# 7 microservicios (alineados al PDF Practica 3) + 7 Postgres + nginx + frontend
# Servicios: product, inventory, sales, customer, notification, auth, company
# ====================================================================

services:

  # ---------- Bases de datos (una por servicio) ----------
  db-product:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: product
    ports: ["${POSTGRES_PORT_PRODUCT}:5432"]
    volumes: ["product-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d product"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: inventory
    ports: ["${POSTGRES_PORT_INVENTORY}:5432"]
    volumes: ["inventory-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-sales:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sales
    ports: ["${POSTGRES_PORT_SALES}:5432"]
    volumes: ["sales-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d sales"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-customer:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: customer
    ports: ["${POSTGRES_PORT_CUSTOMER}:5432"]
    volumes: ["customer-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d customer"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: notification
    ports: ["${POSTGRES_PORT_NOTIFICATION}:5432"]
    volumes: ["notification-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d notification"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth
    ports: ["${POSTGRES_PORT_AUTH}:5432"]
    volumes: ["auth-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-company:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: company
    ports: ["${POSTGRES_PORT_COMPANY}:5432"]
    volumes: ["company-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d company"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Microservicios ----------
  product:
    build: ./services/product
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-product:5432/product
    ports: ["8001:8000"]
    depends_on:
      db-product: { condition: service_healthy }

  inventory:
    build: ./services/inventory
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-inventory:5432/inventory
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports: ["8002:8000"]
    depends_on:
      db-inventory: { condition: service_healthy }
      rabbitmq:     { condition: service_healthy }

  sales:
    build: ./services/sales
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-sales:5432/sales
      PRODUCT_URL: http://product:8000
      INVENTORY_URL: http://inventory:8000
      CUSTOMER_URL: http://customer:8000
    ports: ["8003:8000"]
    depends_on:
      db-sales: { condition: service_healthy }

  customer:
    build: ./services/customer
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-customer:5432/customer
    ports: ["8004:8000"]
    depends_on:
      db-customer: { condition: service_healthy }

  notification:
    build: ./services/notification
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-notification:5432/notification
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports: ["8005:8000"]
    depends_on:
      db-notification: { condition: service_healthy }
      rabbitmq:        { condition: service_healthy }

  auth:
    build: ./services/auth
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-auth:5432/auth
      JWT_SECRET: ${JWT_SECRET}
    ports: ["8006:8000"]
    depends_on:
      db-auth: { condition: service_healthy }

  company:
    build: ./services/company
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-company:5432/company
    ports: ["8007:8000"]
    depends_on:
      db-company: { condition: service_healthy }

  # ---------- Gateway ----------
  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["8000:80"]
    depends_on:
      - product
      - inventory
      - sales
      - customer
      - notification
      - auth
      - company

  # ---------- Frontend ----------
  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports: ["3000:80"]
    depends_on:
      - gateway

  # ---------- Broker (RabbitMQ) ----------
  # Management UI: http://localhost:15672 (guest/guest)
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  product-data:
  inventory-data:
  sales-data:
  customer-data:
  notification-data:
  auth-data:
  company-data:
