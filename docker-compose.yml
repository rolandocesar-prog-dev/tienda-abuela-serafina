# ====================================================================
# Docker Compose — Tienda Abuela Serafina
# 7 microservicios + 7 Postgres + nginx (gateway) + frontend
# ====================================================================

services:

  # ---------- Bases de datos (una por servicio) ----------
  db-catalog:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: catalog
    ports: ["${POSTGRES_PORT_CATALOG}:5432"]
    volumes: ["catalog-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-almacen:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: almacen
    ports: ["${POSTGRES_PORT_ALMACEN}:5432"]
    volumes: ["almacen-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d almacen"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-ventas:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ventas
    ports: ["${POSTGRES_PORT_VENTAS}:5432"]
    volumes: ["ventas-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d ventas"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-compras:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: compras
    ports: ["${POSTGRES_PORT_COMPRAS}:5432"]
    volumes: ["compras-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d compras"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-pagos:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: pagos
    ports: ["${POSTGRES_PORT_PAGOS}:5432"]
    volumes: ["pagos-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d pagos"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-facturacion:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: facturacion
    ports: ["${POSTGRES_PORT_FACTURACION}:5432"]
    volumes: ["facturacion-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d facturacion"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-rrhh:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rrhh
    ports: ["${POSTGRES_PORT_RRHH}:5432"]
    volumes: ["rrhh-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d rrhh"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Microservicios ----------
  catalog:
    build: ./services/catalog
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-catalog:5432/catalog
    ports: ["8001:8000"]
    depends_on:
      db-catalog: { condition: service_healthy }

  almacen:
    build: ./services/almacen
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-almacen:5432/almacen
    ports: ["8002:8000"]
    depends_on:
      db-almacen: { condition: service_healthy }

  ventas:
    build: ./services/ventas
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-ventas:5432/ventas
      CATALOG_URL: http://catalog:8000
      ALMACEN_URL: http://almacen:8000
      PAGOS_URL: http://pagos:8000
      FACTURACION_URL: http://facturacion:8000
    ports: ["8003:8000"]
    depends_on:
      db-ventas: { condition: service_healthy }

  compras:
    build: ./services/compras
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-compras:5432/compras
      ALMACEN_URL: http://almacen:8000
      PAGOS_URL: http://pagos:8000
    ports: ["8004:8000"]
    depends_on:
      db-compras: { condition: service_healthy }

  pagos:
    build: ./services/pagos
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-pagos:5432/pagos
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports: ["8005:8000"]
    depends_on:
      db-pagos: { condition: service_healthy }

  facturacion:
    build: ./services/facturacion
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-facturacion:5432/facturacion
    ports: ["8006:8000"]
    depends_on:
      db-facturacion: { condition: service_healthy }

  rrhh:
    build: ./services/rrhh
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-rrhh:5432/rrhh
    ports: ["8007:8000"]
    depends_on:
      db-rrhh: { condition: service_healthy }

  # ---------- Gateway ----------
  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports: ["8000:80"]
    depends_on:
      - catalog
      - almacen
      - ventas
      - compras
      - pagos
      - facturacion
      - rrhh

  # ---------- Frontend ----------
  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports: ["3000:80"]
    depends_on:
      - gateway

volumes:
  catalog-data:
  almacen-data:
  ventas-data:
  compras-data:
  pagos-data:
  facturacion-data:
  rrhh-data:
