worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    resolver 127.0.0.11 valid=10s;

    upstream catalog_up      { server catalog:8000; }
    upstream almacen_up      { server almacen:8000; }
    upstream ventas_up       { server ventas:8000; }
    upstream compras_up      { server compras:8000; }
    upstream pagos_up        { server pagos:8000; }
    upstream facturacion_up  { server facturacion:8000; }
    upstream rrhh_up         { server rrhh:8000; }

    server {
        listen 80;
        server_name _;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        location = /health {
            return 200 '{"status":"ok"}';
            default_type application/json;
        }

        # Ruteo directo: La barra final '/' en proxy_pass elimina el prefijo automáticamente
        location /catalog/      { proxy_pass http://catalog_up/;      proxy_set_header Host $host; }
        location /almacen/      { proxy_pass http://almacen_up/;      proxy_set_header Host $host; }
        location /ventas/       { proxy_pass http://ventas_up/;       proxy_set_header Host $host; }
        location /compras/      { proxy_pass http://compras_up/;      proxy_set_header Host $host; }
        location /pagos/        { proxy_pass http://pagos_up/;        proxy_set_header Host $host; }
        location /facturacion/  { proxy_pass http://facturacion_up/;  proxy_set_header Host $host; }
        location /rrhh/         { proxy_pass http://rrhh_up/;         proxy_set_header Host $host; }
        
        # Cobertura para llamadas sin barra final
        location /catalog       { proxy_pass http://catalog_up/;      proxy_set_header Host $host; }
        location /almacen       { proxy_pass http://almacen_up/;      proxy_set_header Host $host; }
        location /ventas        { proxy_pass http://ventas_up/;       proxy_set_header Host $host; }
        location /compras       { proxy_pass http://compras_up/;      proxy_set_header Host $host; }
        location /pagos         { proxy_pass http://pagos_up;         proxy_set_header Host $host; }
        location /facturacion   { proxy_pass http://facturacion_up/;  proxy_set_header Host $host; }
        location /rrhh          { proxy_pass http://rrhh_up/;         proxy_set_header Host $host; }
    }
}