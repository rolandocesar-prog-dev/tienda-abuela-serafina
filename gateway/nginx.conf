worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    # Resolver de Docker — necesario para que nginx descubra los servicios por nombre
    resolver 127.0.0.11 valid=10s;

    # Upstreams (los nombres de host coinciden con los servicios del docker-compose)
    upstream catalog_up      { server catalog:8000; }
    upstream almacen_up      { server almacen:8000; }
    upstream ventas_up       { server ventas:8000; }
    upstream compras_up      { server compras:8000; }
    upstream pagos_up        { server pagos:8000; }
    upstream facturacion_up  { server facturacion:8000; }
    upstream rrhh_up         { server rrhh:8000; }

    server {
        listen 80;
        server_name _;

        # CORS para permitir llamadas desde el frontend en :3000
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Health check del gateway
        location = /health {
            return 200 '{"status":"ok","service":"gateway"}';
            default_type application/json;
        }

        # Ruteo por prefijo de servicio
        location /catalog/      { rewrite ^/catalog/(.*)$      /$1 break; proxy_pass http://catalog_up;     proxy_set_header Host $host; }
        location /almacen/      { rewrite ^/almacen/(.*)$      /$1 break; proxy_pass http://almacen_up;     proxy_set_header Host $host; }
        location /ventas/       { rewrite ^/ventas/(.*)$       /$1 break; proxy_pass http://ventas_up;      proxy_set_header Host $host; }
        location /compras/      { rewrite ^/compras/(.*)$      /$1 break; proxy_pass http://compras_up;     proxy_set_header Host $host; }
        location /pagos/        { rewrite ^/pagos/(.*)$        /$1 break; proxy_pass http://pagos_up;       proxy_set_header Host $host; }
        location /facturacion/  { rewrite ^/facturacion/(.*)$  /$1 break; proxy_pass http://facturacion_up; proxy_set_header Host $host; }
        location /rrhh/         { rewrite ^/rrhh/(.*)$         /$1 break; proxy_pass http://rrhh_up;        proxy_set_header Host $host; }
    }
}
