worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    # Resolver de Docker — necesario para que nginx descubra los servicios por nombre
    resolver 127.0.0.11 valid=10s;

    # Upstreams (los nombres de host coinciden con los servicios del docker-compose)
    upstream product_up       { server product:8000; }
    upstream inventory_up     { server inventory:8000; }
    upstream sales_up         { server sales:8000; }
    upstream customer_up      { server customer:8000; }
    upstream notification_up  { server notification:8000; }
    upstream auth_up          { server auth:8000; }
    upstream company_up       { server company:8000; }

    server {
        listen 80;
        server_name _;

        # CORS para permitir llamadas desde el frontend en :3000
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Health check del gateway
        location = /health {
            return 200 '{"status":"ok","service":"gateway"}';
            default_type application/json;
        }

        # ------------------------------------------------------------------
        # Ruteo por prefijo del PDF. NO se reescribe (pass-through).
        # El servicio interno recibe el path tal cual (con su prefijo).
        # ------------------------------------------------------------------
        location /products       { proxy_pass http://product_up;       proxy_set_header Host $host; }
        location /categories     { proxy_pass http://product_up;       proxy_set_header Host $host; }
        location /inventory      { proxy_pass http://inventory_up;     proxy_set_header Host $host; }
        location /sales          { proxy_pass http://sales_up;         proxy_set_header Host $host; }
        location /customers      { proxy_pass http://customer_up;      proxy_set_header Host $host; }
        location /notifications  { proxy_pass http://notification_up;  proxy_set_header Host $host; }
        location /auth           { proxy_pass http://auth_up;          proxy_set_header Host $host; }
        location /companies      { proxy_pass http://company_up;       proxy_set_header Host $host; }
    }
}
