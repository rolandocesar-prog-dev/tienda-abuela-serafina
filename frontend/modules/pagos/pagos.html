<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>💳 Módulo de Pagos y Tesorería</h2>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Registrar Operación</h5>
                </div>
                <div class="card-body">
                    <form id="form-pago" onsubmit="procesarPago(event)">
                        <div class="mb-3">
                            <label class="form-label">Tipo de Operación</label>
                            <select class="form-select" id="pago-tipo" required>
                                <option value="venta">Cobro por Venta (Ingreso)</option>
                                <option value="compra">Pago a Proveedor (Egreso)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">ID de Referencia</label>
                            <input type="text" class="form-control" id="pago-referencia" required readonly>
                            <small class="text-muted">Selecciona una cuenta de las tablas</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Monto (Bs)</label>
                            <input type="number" step="0.01" class="form-control" id="pago-monto" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Método de Pago</label>
                            <select class="form-select" id="pago-metodo" required>
                                <option value="efectivo">Efectivo</option>
                                <option value="transferencia">Transferencia / QR</option>
                                <option value="tarjeta">Tarjeta</option>
                            </select>
                        </div>
                        <button type="submit" id="btn-procesar" class="btn btn-success w-100">
                            Procesar Pago
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">Cuentas por Cobrar (Clientes)</h5>
                    <button class="btn btn-sm btn-outline-light" onclick="cargarCuentasCobrar()">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                        <table class="table table-hover mb-0">
                            <thead class="table-light sticky-top">
                                <tr>
                                    <th>Cliente</th>
                                    <th>Total</th>
                                    <th>Pagado</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-cuentas-cobrar"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0">Cuentas por Pagar (Proveedores)</h5>
                    <button class="btn btn-sm btn-outline-light" onclick="cargarCuentasPagar()">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                        <table class="table table-hover mb-0">
                            <thead class="table-light sticky-top">
                                <tr>
                                    <th>ID Proveedor</th>
                                    <th>Total</th>
                                    <th>Pagado</th>
                                    <th>Estado</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-cuentas-pagar"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-success mt-4">
                <div class="card-header bg-success text-white">
                    <h5 class="card-title mb-0">
                        Historial de Pagos Realizados
                    </h5>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>Proveedor</th>
                                    <th>Total</th>
                                    <th>Pagado</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>

                            <tbody id="tbody-pagos-realizados"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
