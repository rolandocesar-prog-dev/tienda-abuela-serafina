<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🧾 Historial de Facturas</h2>
        <button class="btn btn-outline-primary" onclick="cargarFacturas()">
            <i class="bi bi-arrow-clockwise"></i> Actualizar
        </button>
    </div>

    <div class="table-responsive shadow-sm rounded">
        <table class="table table-hover align-middle" id="tabla-facturas">
            <thead class="table-dark">
                <tr>
                    <th>Correlativo</th>
                    <th>Fecha y Hora</th>
                    <th>Cliente</th>
                    <th>NIT/CI</th>
                    <th>Subtotal</th>
                    <th>IVA (13%)</th>
                    <th>Total Pagado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody-facturas">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalDetalleFactura" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalFacturaTitulo">Detalle de Factura</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <ul class="list-group" id="lista-items-factura">
                    </ul>
            </div>
        </div>
    </div>
</div>
