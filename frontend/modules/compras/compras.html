<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📦 Módulo de Compras (Abastecimiento)</h2>
    </div>

    <ul class="nav nav-tabs" id="comprasTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button id="btn-tab-historial" class="nav-link active" onclick="cambiarPestana('tab-historial', this)" type="button">Historial de Órdenes</button>
        </li>
        <li class="nav-item" role="presentation">
            <button id="btn-tab-nueva" class="nav-link" onclick="cambiarPestana('tab-nueva', this)" type="button">Crear Nueva Orden</button>
        </li>
        <li class="nav-item" role="presentation">
            <button id="btn-tab-proveedores" class="nav-link" onclick="cambiarPestana('tab-proveedores', this)" type="button">Proveedores</button>
        </li>
    </ul>

    <div class="tab-content border border-top-0 p-4 bg-white rounded-bottom shadow-sm" id="comprasTabsContent">
        
        <div class="tab-pane fade show active" id="tab-historial">
            <div class="d-flex justify-content-between mb-3">
                <h5>Órdenes de Compra</h5>
                <button class="btn btn-sm btn-outline-primary" onclick="cargarOrdenes()">Actualizar</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Fecha</th>
                            <th>ID Orden</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-ordenes"></tbody>
                </table>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-nueva">
            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm mb-3">
                        <div class="card-header bg-primary text-white">Configuración del Pedido</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Proveedor</label>
                                <select class="form-select" id="select-proveedor"></select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">ID de Agencia Destino</label>
                                <input type="text" class="form-control" id="input-agencia" value="11111111-1111-1111-1111-111111111111" required>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-secondary text-white">Añadir Producto</div>
                        <div class="card-body">
                            <form id="form-add-item" onsubmit="agregarItem(event)">
                                <div class="mb-2">
                                    <label class="form-label">Producto del Catálogo</label>
                                    <select class="form-select" id="select-producto"></select>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label class="form-label">Cantidad</label>
                                        <input type="number" class="form-control" id="input-cantidad" min="1" required>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">Costo Unit. (Bs)</label>
                                        <input type="number" step="0.01" class="form-control" id="input-costo" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-outline-success w-100">Agregar al Pedido</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <span>Detalle de la Orden</span>
                            <span id="total-draft" class="badge bg-success fs-6">Total: Bs 0.00</span>
                        </div>
                        <div class="card-body p-0">
                            <table class="table mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Producto</th>
                                        <th>Cantidad</th>
                                        <th>Costo U.</th>
                                        <th>Subtotal</th>
                                        <th>Quitar</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody-draft"></tbody>
                            </table>
                        </div>
                        <div class="card-footer text-end">
                            <button class="btn btn-primary" onclick="crearOrdenCompra()">Emitir Orden de Compra</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="tab-proveedores">
            <div class="row">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-header bg-info text-white">Nuevo Proveedor</div>
                        <div class="card-body">
                            <form id="form-proveedor" onsubmit="crearProveedor(event)">
                                <div class="mb-2"><label>Nombre</label><input type="text" class="form-control" id="prov-nombre" required></div>
                                <div class="mb-2"><label>NIT</label><input type="text" class="form-control" id="prov-nit" required></div>
                                <div class="mb-2"><label>Teléfono</label><input type="text" class="form-control" id="prov-telefono"></div>
                                <div class="mb-3"><label>Email</label><input type="email" class="form-control" id="prov-email"></div>
                                <button type="submit" class="btn btn-info text-white w-100">Guardar Proveedor</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <table class="table table-hover shadow-sm border">
                        <thead class="table-light">
                            <tr><th>Nombre</th><th>NIT</th><th>Contacto</th></tr>
                        </thead>
                        <tbody id="tbody-proveedores"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
