<section id="tab-productos" class="container-fluid p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h3 fw-bold text-dark mb-0">
            Catálogo de Productos
        </h2>

        <div class="btn-group shadow-sm" role="group">

            <button
                id="btn-toggle-form"
                class="btn btn-secondary px-3">
                <i class="bi bi-plus-lg"></i>
                Nuevo Producto
            </button>

            <button
                id="btn-actualizar"
                class="btn btn-primary px-3">
                <i class="bi bi-arrow-clockwise"></i>
                Actualizar
            </button>

        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12 col-md-6 col-lg-4">

            <div class="input-group shadow-sm">

                <span class="input-group-text bg-white border-end-0 text-muted">
                    🔍
                </span>

                <input
                    type="text"
                    id="buscador"
                    class="form-control border-start-0"
                    placeholder="Buscar por nombre o SKU...">

            </div>

        </div>
    </div>

    <div
        id="container-form-nuevo"
        class="card p-4 mb-4 bg-white shadow-sm border-0 d-none">

        <h5 class="fw-bold mb-4 text-primary border-bottom pb-2">
            Registrar Nuevo Producto
        </h5>

        <form
            id="form-nuevo-producto"
            class="row g-3">

            <div class="col-md-4">
                <label
                    for="prod-codigo"
                    class="form-label text-uppercase fw-bold text-muted small">
                    Código (SKU)
                </label>

                <input
                    type="text"
                    id="prod-codigo"
                    class="form-control"
                    placeholder="Ej. PROD-001"
                    required>
            </div>

            <div class="col-md-4">
                <label
                    for="prod-nombre"
                    class="form-label text-uppercase fw-bold text-muted small">
                    Nombre
                </label>

                <input
                    type="text"
                    id="prod-nombre"
                    class="form-control"
                    placeholder="Ej. Arroz Extra"
                    required>
            </div>

            <div class="col-md-4">
                <label
                    for="prod-categoria"
                    class="form-label text-uppercase fw-bold text-muted small">
                    Categoría
                </label>

                <input
                    type="text"
                    id="prod-categoria"
                    class="form-control"
                    placeholder="Selecciona..."
                    list="categorias-list"
                    required>

                <datalist id="categorias-list"></datalist>
            </div>

            <div class="col-md-4">
                <label
                    for="prod-unidad"
                    class="form-label text-uppercase fw-bold text-muted small">
                    Unidad
                </label>

                <input
                    type="text"
                    id="prod-unidad"
                    class="form-control"
                    placeholder="Ej. kg"
                    required>
            </div>

            <div class="col-md-4">
                <label
                    for="prod-precio"
                    class="form-label text-uppercase fw-bold text-muted small">
                    Precio Base
                </label>

                <div class="input-group">

                    <span class="input-group-text bg-light text-muted">
                        Bs.
                    </span>

                    <input
                        type="number"
                        id="prod-precio"
                        class="form-control"
                        placeholder="0.00"
                        step="0.01"
                        required>

                </div>
            </div>

            <div class="col-md-12">

                <label
                    for="prod-desc"
                    class="form-label text-uppercase fw-bold text-muted small">
                    Descripción
                </label>

                <textarea
                    id="prod-desc"
                    class="form-control"
                    rows="2"
                    placeholder="Detalles adicionales..."></textarea>

            </div>

            <div class="col-12 mt-4 d-flex align-items-center gap-3">

                <button
                    type="submit"
                    class="btn btn-success px-4 shadow-sm">
                    💾 Guardar Producto
                </button>

                <button
                    type="button"
                    id="btn-cancelar"
                    class="btn btn-outline-secondary px-4">
                    ❌ Cancelar
                </button>

                <div
                    id="form-error"
                    class="text-danger fw-bold small d-none mb-0">
                </div>

            </div>

        </form>
    </div>

    <div class="card shadow-sm border-0">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">SKU</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody id="tabla-productos">
                </tbody>

            </table>

        </div>

    </div>

</section>
