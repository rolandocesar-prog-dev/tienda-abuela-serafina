<div class="module-container fade-in">

    <!-- Tabs internos -->
    <ul class="nav nav-pills mb-4 gap-2" id="empresa-tabs">
        <li class="nav-item">
            <button class="nav-link active empresa-tab-btn" data-section="supermercado">
                <i class="bi bi-shop me-1"></i>Supermercado
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link empresa-tab-btn" data-section="sucursales">
                <i class="bi bi-geo-alt me-1"></i>Sucursales
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link empresa-tab-btn" data-section="usuarios">
                <i class="bi bi-people me-1"></i>Usuarios
            </button>
        </li>
    </ul>

    <!-- ── SECCIÓN: Supermercado ── -->
    <div id="section-supermercado" class="empresa-section">
        <div class="row g-4">
            <!-- Formulario crear -->
            <div class="col-lg-5">
                <div class="form-modern">
                    <h5 class="mb-3"><i class="bi bi-plus-circle me-2" style="color:var(--brown)"></i>Registrar Supermercado</h5>
                    <div class="mb-3">
                        <label class="form-label-sm">Nombre del supermercado</label>
                        <input type="text" id="company-nombre" class="form-control" placeholder="Ej: Supermercado Abuela Serafina">
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm">NIT</label>
                        <input type="text" id="company-nit" class="form-control" placeholder="Ej: 1234567890">
                    </div>
                    <button class="btn btn-brown w-100" id="btn-crear-company">
                        <i class="bi bi-save me-1"></i>Guardar
                    </button>
                </div>
            </div>
            <!-- Lista -->
            <div class="col-lg-7">
                <div class="form-modern">
                    <h5 class="mb-3"><i class="bi bi-list-ul me-2" style="color:var(--teal)"></i>Supermercados registrados</h5>
                    <div id="companies-list">
                        <div class="text-center py-4"><div class="spinner-border" style="color:var(--brown)"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── SECCIÓN: Sucursales ── -->
    <div id="section-sucursales" class="empresa-section d-none">
        <div class="row g-4">
            <!-- Formulario crear -->
            <div class="col-lg-5">
                <div class="form-modern">
                    <h5 class="mb-3"><i class="bi bi-plus-circle me-2" style="color:var(--brown)"></i>Nueva Sucursal</h5>
                    <div class="mb-3">
                        <label class="form-label-sm">Supermercado</label>
                        <select id="branch-company-id" class="form-select">
                            <option value="">Seleccionar supermercado...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm">Nombre de la sucursal</label>
                        <input type="text" id="branch-nombre" class="form-control" placeholder="Ej: Sucursal Centro">
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm">Ciudad</label>
                        <select id="branch-ciudad" class="form-select">
                            <option value="">Seleccionar ciudad...</option>
                            <option value="La Paz">La Paz</option>
                            <option value="El Alto">El Alto</option>
                            <option value="Sucre">Sucre</option>
                            <option value="Cochabamba">Cochabamba</option>
                            <option value="Santa Cruz de la Sierra">Santa Cruz de la Sierra</option>
                            <option value="Oruro">Oruro</option>
                            <option value="Potosí">Potosí</option>
                            <option value="Tarija">Tarija</option>
                            <option value="Trinidad">Trinidad</option>
                            <option value="Cobija">Cobija</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm">Dirección (opcional)</label>
                        <input type="text" id="branch-direccion" class="form-control" placeholder="Ej: Av. 16 de Julio #123">
                    </div>
                    <button class="btn btn-brown w-100" id="btn-crear-branch">
                        <i class="bi bi-save me-1"></i>Crear Sucursal
                    </button>
                </div>
            </div>
            <!-- Lista -->
            <div class="col-lg-7">
                <div class="form-modern">
                    <h5 class="mb-3"><i class="bi bi-geo-alt me-2" style="color:var(--teal)"></i>Sucursales registradas</h5>
                    <div id="branches-list">
                        <p class="text-muted text-center py-3">Seleccione un supermercado para ver sus sucursales</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── SECCIÓN: Usuarios ── -->
    <div id="section-usuarios" class="empresa-section d-none">
        <div class="row g-4">
            <!-- Formulario crear vendedor -->
            <div class="col-lg-5">
                <div class="form-modern">
                    <h5 class="mb-3"><i class="bi bi-person-plus me-2" style="color:var(--brown)"></i>Crear Vendedor</h5>
                    <div class="mb-3">
                        <label class="form-label-sm">Username</label>
                        <input type="text" id="user-username" class="form-control" placeholder="Ej: vendedor_lapaz">
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm">Email</label>
                        <input type="email" id="user-email" class="form-control" placeholder="vendedor@ejemplo.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm">Contraseña</label>
                        <input type="password" id="user-password" class="form-control" placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="mb-3">
                        <label class="form-label-sm">Sucursal asignada</label>
                        <select id="user-sucursal-id" class="form-select">
                            <option value="">Seleccionar sucursal...</option>
                        </select>
                    </div>
                    <button class="btn btn-brown w-100" id="btn-crear-usuario">
                        <i class="bi bi-save me-1"></i>Crear Vendedor
                    </button>
                </div>
            </div>
            <!-- Lista usuarios -->
            <div class="col-lg-7">
                <div class="form-modern">
                    <h5 class="mb-3"><i class="bi bi-people me-2" style="color:var(--teal)"></i>Usuarios del sistema</h5>
                    <div id="usuarios-list">
                        <div class="text-center py-4"><div class="spinner-border" style="color:var(--brown)"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
