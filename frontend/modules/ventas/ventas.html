<div class="container mt-4">
    <h3>Nueva Venta</h3>
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3">
                <form id="form-venta">
                    <div class="mb-3">
                        <label>Agencia</label>
                        <select id="agencia_id" class="form-control" required></select>
                    </div>
                    <div class="mb-3">
                        <label>Producto</label>
                        <select id="producto_id" class="form-control"></select>
                    </div>
                    <div class="mb-3">
                        <label>Cantidad</label>
                        <input type="number" id="cantidad" class="form-control" value="1" min="1">
                    </div>
                    <button type="button" class="btn btn-secondary w-100" onclick="agregarAlCarrito()">Añadir al Carrito</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <table class="table">
                <thead><tr><th>Producto</th><th>Cant</th><th>Precio</th><th>Subtotal</th></tr></thead>
                <tbody id="carrito-body"></tbody>
            </table>
            <h4>Total: Bs. <span id="total-venta">0.00</span></h4>
            <button class="btn btn-primary" onclick="finalizarVenta()">Confirmar Venta</button>
        </div>
    </div>
</div>
