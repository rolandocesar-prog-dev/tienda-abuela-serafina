<div class="module-container">
    <h2>Gestión de Personal (RRHH)</h2>
    <div class="card p-3 mb-4">
        <form id="form-empleado" class="row g-3">
            <div class="col-md-3"><input type="text" id="nombre" class="form-control" placeholder="Nombre" required></div>
            <div class="col-md-3"><input type="text" id="apellido" class="form-control" placeholder="Apellido" required></div>
            <div class="col-md-2"><input type="text" id="ci" class="form-control" placeholder="CI" required></div>
            <div class="col-md-4"><button type="submit" class="btn btn-primary">Registrar Empleado</button></div>
        </form>
    </div>
    <table class="table table-striped">
        <thead><tr><th>Nombre</th><th>Cargo</th><th>Salario</th><th>Acciones</th></tr></thead>
        <tbody id="rrhh-body"></tbody>
    </table>
</div>
