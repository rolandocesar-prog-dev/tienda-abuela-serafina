<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Abuela Serafina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-shop"></i> Abuela Serafina
            </a>
            <div class="d-flex align-items-center">
                <select id="agencia" class="form-select form-select-sm"></select>
            </div>
        </div>
    </nav>

    <nav class="bg-light border-bottom p-2">
        <div class="container-fluid">
            <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm tab-btn active" data-tab="catalog">Productos</button>
                <button class="btn btn-outline-secondary btn-sm tab-btn" data-tab="ventas">Ventas</button>
                <button class="btn btn-outline-secondary btn-sm tab-btn" data-tab="compras">Compras</button>
                <button class="btn btn-outline-secondary btn-sm tab-btn" data-tab="empleados">Empleados</button>
                <button class="btn btn-outline-secondary btn-sm tab-btn" data-tab="reportes">Reportes</button>
            </div>
        </div>
    </nav>

    <main id="app-container" class="container-fluid py-4"></main>

    <script src="modules/api/api.js"></script>
    <script src="app.js"></script>
</body>
</html>
