<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Abuela Serafina - Sistema de Gestión</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Modal de Login -->
    <div class="modal fade" id="modalLogin" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-gradient text-white" style="background: linear-gradient(135deg,#4e73df,#224abe);">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-shop me-2"></i>Abuela Serafina
                    </h5>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted mb-3">Inicie sesión para continuar</p>
                    <div id="login-error" class="alert alert-danger d-none"></div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <input type="text" id="login-username" class="form-control" placeholder="seed_admin" value="seed_admin">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña</label>
                        <input type="password" id="login-password" class="form-control" placeholder="Admin1234!" value="Admin1234!">
                    </div>
                    <button id="btn-login" class="btn btn-primary w-100 fw-bold">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Barra superior -->
    <nav class="navbar navbar-dark bg-gradient shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="#">
                <i class="bi bi-shop me-2"></i>Abuela Serafina
            </a>
            <div class="d-flex align-items-center gap-3">
                <div class="text-white-50 small">
                    <i class="bi bi-calendar3"></i> <span id="fecha-actual"></span>
                </div>
                <span id="usuario-actual" class="text-white-50 small"></span>
                <button class="btn btn-outline-light btn-sm" id="btn-refresh" title="Recargar módulo">
                    <i class="bi bi-arrow-repeat"></i>
                </button>
                <button class="btn btn-outline-warning btn-sm" id="btn-logout" title="Cerrar sesión" style="display:none">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </div>
        </div>
    </nav>

    <!-- Navegación -->
    <nav class="bg-light border-bottom shadow-sm sticky-top">
        <div class="container-fluid">
            <div class="d-flex flex-wrap gap-1 py-1">
                <button class="btn btn-outline-secondary btn-sm tab-btn active" data-tab="catalog">
                    <i class="bi bi-grid-3x3-gap-fill me-1"></i>Productos
                </button>
                <button class="btn btn-outline-secondary btn-sm tab-btn" data-tab="almacen">
                    <i class="bi bi-box-seam me-1"></i>Inventario
                </button>
                <button class="btn btn-outline-secondary btn-sm tab-btn" data-tab="ventas">
                    <i class="bi bi-cart-fill me-1"></i>Ventas
                </button>
            </div>
        </div>
    </nav>

    <!-- Contenedor principal -->
    <main id="app-container" class="container-fluid py-4">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-3 text-muted">Cargando módulo...</p>
        </div>
    </main>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">
            <div class="toast-header">
                <strong class="me-auto"><i class="bi bi-info-circle-fill"></i> Notificación</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="modules/api/api.js"></script>
    <script src="app.js"></script>
</body>
</html>
