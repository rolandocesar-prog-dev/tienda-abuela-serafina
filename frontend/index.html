<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Abuela Serafina - Sistema de Gestión</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏪</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Barra superior -->
    <nav class="navbar navbar-dark navbar-serafina">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-shop-window me-2"></i>Abuela Serafina
            </a>
            <div class="d-flex align-items-center gap-2">
                <div class="navbar-info-pill d-none d-md-flex align-items-center gap-1">
                    <i class="bi bi-calendar3"></i>
                    <span id="fecha-actual"></span>
                </div>
                <div class="navbar-divider d-none d-md-block"></div>
                <div id="usuario-actual-pill" class="navbar-info-pill align-items-center gap-2" style="display:none">
                    <div class="navbar-avatar"><i class="bi bi-person-fill"></i></div>
                    <span id="usuario-actual" style="font-weight:600;font-size:0.82rem"></span>
                </div>
                <button class="btn-nav-icon" id="btn-refresh" title="Recargar módulo" style="display:none">
                    <i class="bi bi-arrow-repeat"></i>
                </button>
                <button class="btn-nav-logout" id="btn-logout" title="Cerrar sesión" style="display:none">
                    <i class="bi bi-box-arrow-right me-1"></i>Salir
                </button>
            </div>
        </div>
    </nav>

    <!-- Barra de tabs (oculta hasta que el usuario se loguee) -->
    <nav id="tab-nav" class="bg-light border-bottom shadow-sm sticky-top" style="display:none">
        <div class="container-fluid">
            <div class="d-flex flex-wrap gap-1 py-1">
                <button class="btn btn-outline-secondary btn-sm tab-btn tab-admin active" data-tab="catalog">
                    <i class="bi bi-grid-3x3-gap-fill me-1"></i>Productos
                </button>
                <button class="btn btn-outline-secondary btn-sm tab-btn tab-admin" data-tab="almacen">
                    <i class="bi bi-box-seam me-1"></i>Inventario
                </button>
                <button class="btn btn-outline-secondary btn-sm tab-btn tab-vendedor" data-tab="ventas">
                    <i class="bi bi-cart-fill me-1"></i>Ventas
                </button>
                <button class="btn btn-outline-secondary btn-sm tab-btn tab-admin" data-tab="empresa">
                    <i class="bi bi-building me-1"></i>Empresa
                </button>
                <button class="btn btn-outline-secondary btn-sm tab-btn tab-admin" data-tab="reportes">
                    <i class="bi bi-bar-chart-fill me-1"></i>Reportes
                </button>
            </div>
        </div>
    </nav>

    <!-- Contenedor principal -->
    <main id="app-container"></main>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">
            <div class="toast-header">
                <strong class="me-auto"><i class="bi bi-info-circle-fill"></i> Notificación</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="modules/api/api.js"></script>
    <script src="app.js"></script>
</body>
</html>
